{% load static %}

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{% static 'images/white_logo.png' %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="{% static 'users/css/styles.css' %}">
    <title>{% block title %} Home {% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .side-bar, .side-bar span, .side-bar a {
            font-family: 'Plus Jakarta Sans', sans-serif !important;
        }
    </style>

</head>

<body class="bg-gray-50 antialiased h-screen overflow-hidden flex flex-col">
    <!--heading bar-->
    <div class="bg-gray-100 shadow-md w-full flex items-center justify-between px-6 py-2 shrink-0 z-20">
        <div class="flex items-center gap-2">
            <img src="{% static 'images/purple_logo.png' %}" class="w-12">
            <h1 class="text-black text-3xl font-extrabold tracking-tight pl-2">
                Keepin<span class="text-violet-900">Up</span>
            </h1>
        </div>
        <div class="flex-1 max-w-xl flex items-center">
            <input type="text" placeholder="Rechercher..." 
            class="w-full outline-none py-2 px-4 rounded-md border border-violet-900
            active:scale-[0.99] focus:ring-2 focus:ring-violet-200 transition-all duration-300">

            <button>
                <img src="{% static 'images/Goku.jfif'%}" class="rounded-full ml-2 h-10 w-10">
            </button>
        </div>
    </div>

    <div class="flex flex-1">

        <!-- side Bar-->
        <div class="bg-violet-950 h-full shadow-md w-64 rounded-r-2xl flex flex-col py-4 shrink-0 overflow-y-auto side-bar">
            <div class="text-violet-700 pl-5 w-full">
                Aperçu
            </div>

            <a href="{% url 'analyzer:main_page' %}" class="flex px-4 py-2 items-center gap-3 rounded-xl
            {% if request.resolver_match.view_name == 'analyzer:main_page' %}
                pl-6 text-white bg-white/10
            {% else %}
                hover:bg-white/10 hover:pl-6 text-gray-400 hover:text-white transition-all duration-300 ease-in-out
            {% endif %}">
                <div>
                    <svg 
                        xmlns="http://www.w3.org/2000/svg" 
                        viewBox="0 0 24 24" 
                        fill="currentColor"
                        class="w-6 h-6"
                        >
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                        <path d="M12.707 2.293l9 9c.63 .63 .184 1.707 -.707 1.707h-1v6a3 3 0 0 1 -3 3h-1v-7a3 3 0 0 0 -2.824 -2.995l-.176 -.005h-2a3 3 0 0 0 -3 3v7h-1a3 3 0 0 1 -3 -3v-6h-1c-.89 0 -1.337 -1.077 -.707 -1.707l9 -9a1 1 0 0 1 1.414 0m.293 11.707a1 1 0 0 1 1 1v7h-4v-7a1 1 0 0 1 .883 -.993l.117 -.007z"/>
                    </svg>
                </div>
                <div class="flex flex-1">
                    <span class="text-lg font-xl w-full text-left pt-1">Dashboard</span>
                </div>
            </a>

            <hr class="w-52 ml-4 justify-center border-violet-900">

            <a href="" class="flex px-4 py-2 items-center gap-3 hover:bg-white/10 rounded-xl hover:pl-6
                        transition-all duration-300 ease-in-out text-gray-400 hover:text-white"> 
                <div class="w-6 h-6">
                    <svg xmlns="http://www.w3.org/2000/svg" 
                        viewBox="0 0 24 24" fill="none" 
                        stroke="currentColor" 
                        stroke-width="2" 
                        stroke-linecap="round" 
                        stroke-linejoin="round" 
                        class="w-6 h-6"
                        >
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M10 3.2a9 9 0 1 0 10.8 10.8a1 1 0 0 0 -1 -1h-3.8a4.1 4.1 0 1 1 -5 -5v-4a.9 .9 0 0 0 -1 -.8" />
                        <path d="M15 3.5a9 9 0 0 1 5.5 5.5h-4.5a9 9 0 0 0 -1 -1v-4.5" />
                    </svg>
                </div>
                <div class="flex flex-1">
                    <span class="text-lg font-xl w-full text-left pt-1">Analytique</span>
                </div>
            </a>

            <hr class="w-52 ml-4 justify-center border-violet-900">

            <a href="{% url 'users:users_list' %}" class="flex px-4 py-2 items-center gap-3 rounded-xl
            {% if request.resolver_match.view_name == 'users:users_list' %}
                pl-6 text-white bg-white/10
            {% else %}
                hover:bg-white/10 hover:pl-6 text-gray-400 hover:text-white transition-all duration-300 ease-in-out
            {% endif %}">
                <div>
                    <svg 
                        xmlns="http://www.w3.org/2000/svg" 
                        viewBox="0 0 24 24" 
                        fill="none" 
                        stroke="currentColor" 
                        stroke-width="2"
                        stroke-linecap="round" 
                        stroke-linejoin="round" 
                        class="w-6 h-6"
                        >
                        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                        <path d="M5 7a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"/>
                        <path d="M3 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        <path d="M21 21v-2a4 4 0 0 0 -3 -3.85"/>
                    </svg>
                </div>
                <div class="flex flex-1">
                    <span class="text-lg font-xl w-full text-left pt-1">Utilisateurs</span>
                </div>
            </a>

            <hr class="w-52 ml-4 justify-center border-violet-900">

            <a href="{% url 'reports:reports_list' %}" class="flex px-4 py-2 items-center gap-3 rounded-xl
            {% if request.resolver_match.view_name == 'reports:reports_list' %}
                pl-6 text-white bg-white/10
            {% else %}
                hover:bg-white/10 hover:pl-6 text-gray-400 hover:text-white transition-all duration-300 ease-in-out
            {% endif %}">
                <div class="w-6 h-6">
                    <svg 
                        xmlns="http://www.w3.org/2000/svg" 
                        viewBox="0 0 24 24" 
                        fill="none" 
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round" 
                        stroke-linejoin="round"
                        class="w-6 h-6"
                        >
                        <path d="M9 5h-2a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-12a2 2 0 0 0 -2 -2h-2"/>
                        <path d="M9 5a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2a2 2 0 0 1 -2 2h-2a2 2 0 0 1 -2 -2"/>
                        <path d="M9 12h6"/>
                        <path d="M9 16h6"/>
                    </svg>
                </div>
                <div class="flex-1">
                    <span class="text-lg font-xl w-full text-left pt-1">Rapports</span>
                </div>
            </a>

            <hr class="w-52 ml-4 justify-center border-violet-900">

            <a href="" class="flex px-4 py-2 items-center gap-3 hover:bg-white/10 rounded-xl hover:pl-6
                        transition-all duration-300 ease-in-out text-gray-400 hover:text-white"> 
                <div class="w-6 h-6">
                    <svg 
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24" 
                        fill="currentColor" 
                        class="w-6 h-6"
                        >
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M3 15.731c1.968 1.507 5.234 2.269 9 2.269c3.76 0 7.025 -.76 9 -2.252v2.252c0 2.425 -3.895 3.936 -8.693 3.998l-.307 .002c-4.938 0 -9 -1.523 -9 -4z" />
                        <path d="M3 9.731c1.968 1.507 5.234 2.269 9 2.269c3.76 0 7.025 -.76 9 -2.252v2.252c0 2.477 -4.062 4 -9 4c-4.798 0 -8.77 -1.438 -8.979 -3.795l-.016 -.101l-.005 -.104z" />
                        <path d="M12 2c1.041 0 2.044 .068 2.977 .198l.469 .071q .84 .14 1.586 .348l.44 .131l.075 .024a11 11 0 0 1 .805 .3l.199 .086q .535 .242 .967 .53q .165 .11 .313 .225a3.8 3.8 0 0 1 .669 .668l.091 .128q .07 .105 .129 .211l.07 .139q .163 .35 .2 .73l.01 .211c0 2.477 -4.062 4 -9 4c-4.798 0 -8.77 -1.438 -8.979 -3.795a1 1 0 0 1 -.021 -.205l.005 -.104l.016 -.1c.205 -2.306 4.01 -3.733 8.667 -3.794z" />
                    </svg>
                </div>
                <div class="flex flex-1">
                    <span class="text-lg font-xl w-full text-left pt-1">Données</span>
                </div>
            </a>

            <div class="text-violet-700 pl-5 w-full">
                Profil
            </div>

            <a href="" class="flex px-4 py-2 items-center gap-3 hover:bg-white/10 rounded-xl hover:pl-6
                        transition-all duration-300 ease-in-out text-gray-400 hover:text-white"> 
                <div class="w-6 h-6">
                    <svg 
                        xmlns="http://www.w3.org/2000/svg" 
                        viewBox="0 0 24 24" 
                        fill="none" 
                        stroke="currentColor" 
                        stroke-width="2" 
                        stroke-linecap="round" 
                        stroke-linejoin="round" 
                        class="w-6 h-6"
                        >
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M10 9a2 2 0 1 0 4 0a2 2 0 0 0 -4 0" />
                        <path d="M4 8v-2a2 2 0 0 1 2 -2h2" />
                        <path d="M4 16v2a2 2 0 0 0 2 2h2" />
                        <path d="M16 4h2a2 2 0 0 1 2 2v2" />
                        <path d="M16 20h2a2 2 0 0 0 2 -2v-2" />
                        <path d="M8 16a2 2 0 0 1 2 -2h4a2 2 0 0 1 2 2" />
                    </svg>
                </div>
                <div class="flex flex-1">
                    <span class="text-lg font-xl w-full text-left pt-1">Compte</span>
                </div>
            </a>

            <hr class="w-52 ml-4 justify-center border-violet-900">

            <a href="" class="flex px-4 py-2 items-center gap-3 hover:bg-white/10 rounded-xl hover:pl-6
                        transition-all duration-300 ease-in-out text-gray-400 hover:text-white"> 
                <div class="w-6 h-6">
                    <svg 
                        xmlns="http://www.w3.org/2000/svg" 
                        viewBox="0 0 24 24" 
                        fill="none" 
                        stroke="currentColor" 
                        stroke-width="2" 
                        stroke-linecap="round" 
                        stroke-linejoin="round" 
                        class="h-6 w-6"
                        >
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065" />
                        <path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0" />
                    </svg>
                </div>
                <div class="flex flex-1">
                    <span class="text-lg font-xl w-full text-left pt-1"">Paramètres</span>
                </div>
            </a>

            <div class="text-violet-700 pl-5 w-full">
                Se Déconnecter
            </div>

            <a href="" class="flex px-4 py-2 items-center gap-3 hover:bg-white/10 rounded-xl hover:pl-6
                        transition-all duration-300 ease-in-out text-gray-400 hover:text-white"> 
                <div class="w-6 h-6">
                    <svg 
                        xmlns="http://www.w3.org/2000/svg" 
                        viewBox="0 0 24 24" 
                        fill="none" 
                        stroke="currentColor" 
                        stroke-width="2" 
                        stroke-linecap="round" 
                        stroke-linejoin="round" 
                        class="h-6 w-6"
                        >
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2" />
                        <path d="M9 12h12l-3 -3" /><path d="M18 15l3 -3" />
                    </svg>
                </div>
                <div class="flex flex-1">
                    <span class="text-lg font-xl w-full text-left pt-1">Se Déconnecter</span>
                </div>
            </a>
        </div>

        <main class="flex-1 overflow-y-auto bg-gray-50 p-6 scroll-smooth">
            {% block main_content %}{% endblock %}
        </main>
    </div>
</body>
</html>
